site_name: quando
site_description: Time translation & holiday tracking for backtesting pipelines
site_url: https://aexsalomao.github.io/quando
repo_url: https://github.com/aexsalomao/quando
repo_name: aexsalomao/quando

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - admonition
  - tables

nav:
  - Home: index.md
  - API Reference: api.md
  - Contributing: contributing.md
  - Changelog: changelog.md
